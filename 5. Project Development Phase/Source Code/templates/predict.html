<!DOCTYPE html>
<html>
<head>
    <title>Flood Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>🌊 Flood Prediction Form</h1>
    <p>Enter the meteorological parameters below.</p>

    <form action="/result" method="post">

        <div class="form-grid">

            <input type="number" name="Temp"
                   placeholder="Temperature (°C)" required>

            <input type="number" name="Humidity"
                   placeholder="Humidity (%)" required>

            <input type="number" name="cloud_cover"
                   placeholder="Cloud Cover (%)" required>

            <input type="number" step="0.1" name="ANNUAL"
                   placeholder="Annual Rainfall (mm)" required>

            <input type="number" step="0.1" name="jan_feb"
                   placeholder="Jan-Feb Rainfall (mm)" required>

            <input type="number" step="0.1" name="mar_may"
                   placeholder="Mar-May Rainfall (mm)" required>

            <input type="number" step="0.1" name="jun_sep"
                   placeholder="Jun-Sep Rainfall (mm)" required>

            <input type="number" step="0.1" name="oct_dec"
                   placeholder="Oct-Dec Rainfall (mm)" required>

            <input type="number" step="0.1" name="avgjune"
                   placeholder="Average June Rainfall (mm)" required>

            <input type="number" step="0.1" name="sub"
                   placeholder="Sub Rainfall Index" required>

        </div>

        <button type="submit">Predict Flood Risk</button>

    </form>

</div>

</body>
</html>
